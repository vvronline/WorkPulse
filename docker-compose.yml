services:
  workpulse:
    build: .
    container_name: workpulse-app
    restart: unless-stopped
    ports:
      - "80:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_PATH=/app/server/data/attendance.db
      # The JWT Secret MUST be defined in a .env file to be passed exactly. Default supplied here for clarity.
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key_here}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
      # Email SMTP settings (Optional)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    volumes:
      # Map the physical data folder so database and uploads persist
      - ./server/data:/app/server/data
      # Map the avatar uploads folder to the host system
      - ./server/uploads:/app/server/uploads
    networks:
      - workpulse-network

networks:
  workpulse-network:
    driver: bridge
